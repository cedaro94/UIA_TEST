{% extends "base.html" %}

{% block content %}

<h3>Estudiantes TCU</h3>

<table class="table table-bordered table-hover bg-white">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Cédula</th>
            <th>Email</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
    {% for s in students %}
        <tr>
            <td>{{ s.id }}</td>
            <td>{{ s.name }}</td>
            <td>{{ s.identification }}</td>
            <td>{{ s.email }}</td>

            <td>
                <span class="badge bg-primary">{{ s.status }}</span>
            </td>

            <td>
                <a class="btn btn-sm btn-warning"
                   href="/edit-status/{{ s.id }}/">
                   Cambiar estado
                </a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>

{% endblock %}
