<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCU UIA</title>
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/
bootstrap.min.css" rel="stylesheet">
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?
family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body {
font-family: 'Montserrat', sans-serif;
background-color: #f5f7fa;
color: #1f2937;
}
.navbar-uia {
background: linear-gradient(90deg, #002b5c 0%, #003b7a 100%);
padding: 14px 0;
box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.navbar-brand {
font-size: 24px;
font-weight: 700;
color: white !important;
}
.nav-link {
color: white !important;
font-weight: 500;
margin-left: 20px;
}
.hero {
background: linear-gradient(rgba(0,43,92,.8), rgba(0,43,92,.8)),
url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1920');
background-size: cover;
background-position: center;
color: white;
padding: 80px 20px;
text-align: center;
margin-bottom: 40px;
}
.hero h1 {
font-size: 48px;
font-weight: 700;
}
.hero p {
font-size: 18px;
margin-top: 15px;
}
.card-uia {
background: white;
border-radius: 18px;
padding: 30px;
box-shadow: 0 8px 30px rgba(0,0,0,0.08);
border: none;
}
.btn-uia {
background-color: #f59e0b;
color: white;
border: none;
padding: 12px 24px;
border-radius: 12px;
font-weight: 600;
transition: all .3s;
}
.btn-uia:hover {
background-color: #d97706;
transform: translateY(-2px);
color: white;
}
.table thead {
background-color: #002b5c;
color: white;

}
.status-review {
background: #dbeafe;
color: #1d4ed8;
padding: 6px 12px;
border-radius: 20px;
font-size: 12px;
font-weight: 600;
}
.status-approved {
background: #dcfce7;
color: #15803d;
padding: 6px 12px;
border-radius: 20px;
font-size: 12px;
font-weight: 600;
}
.status-pending {
background: #fef3c7;
color: #b45309;
padding: 6px 12px;
border-radius: 20px;
font-size: 12px;
font-weight: 600;
}
.status-rejected {
background: #fee2e2;
color: #b91c1c;
padding: 6px 12px;
border-radius: 20px;
font-size: 12px;
font-weight: 600;
}
footer {
margin-top: 60px;
background-color: #002b5c;
color: white;
padding: 25px;
text-align: center;
}
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-uia">
<div class="container">
<a class="navbar-brand" href="/">
 TCU UIA
</a>
<div>
<a class="nav-link d-inline" href="/">
 Estudiantes
</a>
<a class="nav-link d-inline" href="/create/">
 Nuevo Registro
</a>
</div>
</div>
</nav>
<section class="hero">
<div class="container">
<h1>Trabajo Comunal Universitario</h1>
<p>
 Plataforma de gestión académica UIA
</p>
</div>
</section>
<div class="container mb-5">
 {% block content %}
 {% endblock %}
</div>
<footer>
 Universidad Internacional de las Américas © 2026
</footer>
</body>
</html>
